<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; connect-src 'none'; img-src 'self' data: file:; media-src 'none'; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll Capture Frame</title>
    <link rel="stylesheet" href="./scroll-frame.css" />
  </head>
  <body>
    <div class="frame">
      <button class="edge edge-top" id="topHandle" type="button" aria-label="Add current view above">Add above</button>
      <button class="edge edge-bottom" id="bottomHandle" type="button" aria-label="Add current view below">Add below</button>
      <div class="controls">
        <span id="segmentCount">1 frame</span>
        <button id="doneBtn" type="button">Done</button>
        <button id="cancelBtn" type="button">Cancel</button>
      </div>
      <div class="label" id="frameStatus">Scroll the page, then drag the bottom edge down or top edge up to add that view.</div>
    </div>
    <script src="./scroll-frame.js"></script>
  </body>
</html>
