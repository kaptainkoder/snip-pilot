<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: file:; style-src 'self'; script-src 'self'; connect-src 'none'; media-src 'none'; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Snip</title>
    <link rel="stylesheet" href="./editor.css" />
  </head>
  <body>
    <header class="bar">
      <div class="tools">
        <button data-tool="pen">Pen</button>
        <button data-tool="highlight">Highlight</button>
        <button data-tool="line">Line</button>
        <button data-tool="arrow">Arrow</button>
        <button data-tool="rect">Rectangle</button>
        <button data-tool="ellipse">Circle</button>
        <button data-tool="redact">Redact</button>
        <button data-tool="number">Step</button>
        <button data-tool="text">Text box</button>
        <button data-tool="eraser">Eraser</button>
        <input id="colorInput" type="color" value="#f04438" title="Color" />
        <input id="sizeInput" type="range" min="2" max="34" value="6" title="Size" />
      </div>
      <div class="actions">
        <button id="undoBtn">Undo</button>
        <button id="resetBtn">Reset</button>
        <button id="closeBtn" class="primary">Copy & close</button>
      </div>
    </header>
    <main class="stage">
      <canvas id="canvas"></canvas>
    </main>
    <script src="./editor.js"></script>
  </body>
</html>
